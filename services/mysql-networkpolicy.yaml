apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mysql-lan-only
  namespace: galassmyname-dev
spec:
  podSelector:
    matchLabels:
      app: mysql
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              zone: lan
      ports:
        - protocol: TCP
          port: 3306