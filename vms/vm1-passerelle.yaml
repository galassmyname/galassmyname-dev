apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm1-passerelle
  namespace: galassmyname-dev
  labels:
    app: passerelle
    zone: lan
spec:
  runStrategy: Always
  template:
    metadata:
      labels:
        app: passerelle
        zone: lan
    spec:
      domain:
        cpu:
          cores: 1
        memory:
          guest: 1Gi
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
      networks:
        - name: default
          pod: {}
      volumes:
        - name: rootdisk
          containerDisk:
            image: quay.io/containerdisks/ubuntu:22.04
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              user: cloud-user
              password: Admin1234!
              chpasswd: { expire: False }
              ssh_pwauth: True
              runcmd:
                - apt-get update -y
                - echo 'net.ipv4.ip_forward=1' >> /etc/sysctl.conf
                - sysctl -p
                - iptables -F
                - iptables -t nat -F
                - iptables -P INPUT DROP
                - iptables -P FORWARD DROP
                - iptables -P OUTPUT ACCEPT
                - iptables -A INPUT -m state --state ESTABLISHED,RELATED -j ACCEPT
                - iptables -A FORWARD -m state --state ESTABLISHED,RELATED -j ACCEPT
                - iptables -A INPUT -p tcp --dport 22 -j ACCEPT
                - iptables -A FORWARD -p tcp --dport 80 -d 192.168.100.0/24 -j ACCEPT
                - iptables -A FORWARD -p tcp --dport 443 -d 192.168.100.0/24 -j ACCEPT
                - iptables -A FORWARD -p tcp --dport 3306 -s 192.168.100.0/24 -j DROP
                - iptables -A FORWARD -p tcp --dport 3306 -s 192.168.10.0/24 -j ACCEPT
                - iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
                - apt-get install -y iptables-persistent
                - netfilter-persistent save